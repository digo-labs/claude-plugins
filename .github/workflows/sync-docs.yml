name: Sync skill docs to core

# Regenerates the design-system Skills docs from this marketplace whenever a
# skill or the marketplace catalog changes, and opens a PR against digo-labs/core.
#
# Requires a repo secret CORE_DOCS_TOKEN: a fine-grained PAT scoped to
# digo-labs/core with Contents (read/write) + Pull requests (read/write).
# Until that secret is set, this workflow no-ops (it does not fail).

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      CORE_DOCS_TOKEN: ${{ secrets.CORE_DOCS_TOKEN }}
    steps:
      - name: Check for token
        id: check
        run: |
          if [ -z "$CORE_DOCS_TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "CORE_DOCS_TOKEN not set — skipping docs sync. Add the secret to enable it."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout marketplace (this repo)
        if: steps.check.outputs.has_token == 'true'
        uses: actions/checkout@v4
        with:
          path: plugins-repo

      - name: Checkout core
        if: steps.check.outputs.has_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: digo-labs/core
          path: core
          token: ${{ secrets.CORE_DOCS_TOKEN }}

      - name: Set up Node
        if: steps.check.outputs.has_token == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate skill docs + llms.txt
        if: steps.check.outputs.has_token == 'true'
        run: |
          node core/apps/design-system/scripts/gen-skill-docs.js \
            --plugins-dir "$GITHUB_WORKSPACE/plugins-repo" \
            --docs-dir "$GITHUB_WORKSPACE/core/apps/design-system/src/app/docs"
          node core/apps/design-system/scripts/build-llms-txt.js

      - name: Open PR to core
        if: steps.check.outputs.has_token == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CORE_DOCS_TOKEN }}
          path: core
          base: main
          branch: bot/skill-docs-sync
          delete-branch: true
          commit-message: 'docs: sync Skills section from claude-plugins'
          title: 'docs: sync Skills section from claude-plugins'
          body: |
            Auto-generated from the `claude-plugins` marketplace by the `sync-docs` workflow.

            Regenerates the per-skill pages, the Skills overview, and the install page, and rebuilds `llms.txt`. Do not edit the generated pages by hand — edit the upstream `SKILL.md`.
          add-paths: |
            apps/design-system/src/app/docs/skill-*.mdx
            apps/design-system/src/app/docs/skills-*.mdx
            apps/design-system/public/llms.txt
